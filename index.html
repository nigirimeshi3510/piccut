<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PicCut 640x200 Cropper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Browser Crop Tool</p>
      <h1>16:5 固定で切り抜いて、そのまま保存</h1>
      <p class="lead">
        JPG / JPEG / PNG を読み込み、固定比率 16:5 の切り抜き枠をドラッグして位置調整できます。
      </p>
    </section>

    <section class="panel controls">
      <div class="control-row">
        <label class="file-picker">
          <span>画像を開く</span>
          <input id="fileInput" type="file" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
        </label>
        <button id="saveButton" type="button" disabled>切り抜きして保存</button>
      </div>

      <div class="control-row control-row-options">
        <label class="checkbox">
          <input id="resizeCheckbox" type="checkbox" checked>
          <span>保存時に 640x200 にリサイズする</span>
        </label>
      </div>

      <div class="meta-grid">
        <div>
          <span class="meta-label">入力画像</span>
          <span id="imageInfo" class="meta-value">未選択</span>
        </div>
        <div>
          <span class="meta-label">保存範囲</span>
          <span id="cropInfo" class="meta-value">-</span>
        </div>
      </div>
    </section>

    <section class="panel canvas-panel">
      <div class="canvas-frame">
        <canvas id="previewCanvas" width="960" height="640" aria-label="画像プレビュー"></canvas>
      </div>
      <p class="hint">枠の内側をドラッグして位置を調整します。枠は画像の外に出ません。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
